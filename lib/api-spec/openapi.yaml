openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LiveStorm AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: streamers
    description: Streamer profile operations
  - name: kingdoms
    description: Kingdom operations
  - name: sessions
    description: Live session operations
  - name: automations
    description: Automation trigger operations
  - name: gamification
    description: Gamification engine operations
  - name: boss-battles
    description: Boss battle operations
  - name: mini-games
    description: Mini-game operations
  - name: universe
    description: Global universe and alliance operations
  - name: ai
    description: AI assistant and moderation operations
  - name: obs
    description: OBS Browser Source overlay operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/tiktok:
    post:
      operationId: connectTiktok
      tags: [users]
      summary: Connect TikTok username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TiktokConnect"
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /streamers/me:
    get:
      operationId: getMyStreamer
      tags: [streamers]
      summary: Get current user's streamer profile
      responses:
        "200":
          description: Streamer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Streamer"
        "404":
          description: Not found

  /streamers:
    get:
      operationId: getStreamers
      tags: [streamers]
      summary: List all live streamers
      responses:
        "200":
          description: List of streamers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Streamer"

  /streamers/top:
    get:
      operationId: getTopStreamers
      tags: [streamers]
      summary: Get top streamers by gifts received
      responses:
        "200":
          description: Top streamers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Streamer"

  /kingdoms/me:
    get:
      operationId: getMyKingdom
      tags: [kingdoms]
      summary: Get current user's kingdom
      responses:
        "200":
          description: Kingdom data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kingdom"
        "404":
          description: Not found

  /kingdoms:
    get:
      operationId: getKingdoms
      tags: [kingdoms]
      summary: List all kingdoms (global universe)
      responses:
        "200":
          description: List of kingdoms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kingdom"

  /sessions/start:
    post:
      operationId: startSession
      tags: [sessions]
      summary: Start a live session
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStarted"
        "400":
          description: Already live
        "404":
          description: No streamer profile

  /sessions/end:
    post:
      operationId: endSession
      tags: [sessions]
      summary: End the current live session
      responses:
        "200":
          description: Session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: No active session

  /sessions/active:
    get:
      operationId: getActiveSession
      tags: [sessions]
      summary: Get the current active session (if any)
      responses:
        "200":
          description: Active session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionResponse"

  /sessions/{id}/stats:
    get:
      operationId: getSessionStats
      tags: [sessions]
      summary: Get stats for a specific session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStats"
        "404":
          description: Not found

  /sessions:
    get:
      operationId: getSessions
      tags: [sessions]
      summary: Get session history
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /automations:
    get:
      operationId: getAutomations
      tags: [automations]
      summary: List all automations for current user
      responses:
        "200":
          description: Automation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Automation"
    post:
      operationId: createAutomation
      tags: [automations]
      summary: Create a new automation trigger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationCreate"
      responses:
        "200":
          description: Created automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"

  /gamification/leaderboard:
    get:
      operationId: getGamificationLeaderboard
      tags: [gamification]
      summary: Get viewer leaderboard by XP
      parameters:
        - name: streamerId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /gamification/achievements:
    get:
      operationId: getAchievements
      tags: [gamification]
      summary: Get all achievements with unlock status
      parameters:
        - name: streamerId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Achievements list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"

  /gamification/me:
    get:
      operationId: getMyGamificationStats
      tags: [gamification]
      summary: Get current user's own XP, level, rank, and coins
      responses:
        "200":
          description: Current user's gamification stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamificationMe"

  /gamification/streamer-leaderboard:
    get:
      operationId: getStreamerLeaderboard
      tags: [gamification]
      summary: Get top streamers ranked by XP awarded and gifts received
      responses:
        "200":
          description: Streamer leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StreamerLeaderboardEntry"

  /kingdoms/buildings/{type}/upgrade:
    post:
      operationId: upgradeKingdomBuilding
      tags: [kingdoms]
      summary: Upgrade a building to the next level by spending resources
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upgrade result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingUpgradeResult"
        "400":
          description: Insufficient resources or unknown building
        "404":
          description: Building not unlocked or kingdom not found

  /gamification/daily-claim:
    post:
      operationId: claimDailyReward
      tags: [gamification]
      summary: Claim daily coins reward
      responses:
        "200":
          description: Claim result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyClaimResult"

  /gamification/daily-claim/status:
    get:
      operationId: getDailyClaimStatus
      tags: [gamification]
      summary: Check if daily reward has been claimed today
      responses:
        "200":
          description: Claim status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyClaimStatus"

  /boss-battles/active:
    get:
      operationId: getActiveBossBattle
      tags: [boss-battles]
      summary: Get the active boss battle for current streamer
      responses:
        "200":
          description: Active battle or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveBattleResponse"

  /boss-battles:
    get:
      operationId: getBossBattles
      tags: [boss-battles]
      summary: List recent boss battles
      responses:
        "200":
          description: Battles list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BossBattle"
    post:
      operationId: spawnBossBattle
      tags: [boss-battles]
      summary: Spawn a new boss battle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnBossRequest"
      responses:
        "200":
          description: Created battle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BossBattle"
        "400":
          description: Battle already active

  /boss-battles/{id}/end:
    post:
      operationId: endBossBattle
      tags: [boss-battles]
      summary: End/expire a boss battle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated battle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BossBattle"

  /boss-battles/{id}/attacks:
    get:
      operationId: getBossAttacks
      tags: [boss-battles]
      summary: Get attack feed for a battle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attack list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BossAttack"

  /mini-games/spin:
    post:
      operationId: spinWheel
      tags: [mini-games]
      summary: Spin the prize wheel
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionIdBody"
      responses:
        "200":
          description: Spin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpinResult"

  /mini-games/lucky-draw:
    post:
      operationId: runLuckyDraw
      tags: [mini-games]
      summary: Pick a random winner from active viewers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LuckyDrawRequest"
      responses:
        "200":
          description: Draw result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LuckyDrawResult"

  /mini-games/pvp:
    post:
      operationId: runPvpBattle
      tags: [mini-games]
      summary: Run a PvP battle between two viewers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PvpRequest"
      responses:
        "200":
          description: PvP result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvpResult"

  /mini-games/quiz/start:
    post:
      operationId: startQuiz
      tags: [mini-games]
      summary: Start a quiz question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizStartRequest"
      responses:
        "200":
          description: Quiz started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /mini-games/treasure-hunt/start:
    post:
      operationId: startTreasureHunt
      tags: [mini-games]
      summary: Start a treasure hunt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreasureHuntRequest"
      responses:
        "200":
          description: Treasure hunt started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /universe/alliances:
    get:
      operationId: getUniverseAlliances
      tags: [universe]
      summary: Get alliances for current streamer
      responses:
        "200":
          description: Alliances list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alliance"
    post:
      operationId: createAlliance
      tags: [universe]
      summary: Request an alliance with another streamer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllianceRequest"
      responses:
        "200":
          description: Created alliance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alliance"

  /universe/alliances/{id}:
    patch:
      operationId: updateAlliance
      tags: [universe]
      summary: Accept or reject an alliance request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllianceUpdate"
      responses:
        "200":
          description: Updated alliance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alliance"

  /universe/rankings:
    get:
      operationId: getUniverseRankings
      tags: [universe]
      summary: Get global kingdom rankings
      responses:
        "200":
          description: Rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UniverseRanking"

  /automations/{id}:
    patch:
      operationId: updateAutomation
      tags: [automations]
      summary: Update an automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationUpdate"
      responses:
        "200":
          description: Updated automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
    delete:
      operationId: deleteAutomation
      tags: [automations]
      summary: Delete an automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok

  /obs/token:
    post:
      operationId: generateObsToken
      tags: [obs]
      summary: Generate a short-lived overlay token for the current streamer
      responses:
        "200":
          description: Overlay token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObsToken"
        "404":
          description: No streamer profile

  /obs/state/{streamerId}:
    get:
      operationId: getObsState
      tags: [obs]
      summary: Get overlay state (active session, boss battle, leaderboard)
      parameters:
        - name: streamerId
          in: path
          required: true
          schema:
            type: integer
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overlay state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObsOverlayState"
        "401":
          description: Invalid or expired token

  /ai/config:
    get:
      tags: [ai]
      summary: Get AI persona config
      operationId: getAiConfig
      responses:
        "200":
          description: AI persona config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPersonaConfig"
    put:
      tags: [ai]
      summary: Update AI persona config
      operationId: updateAiConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPersonaConfigUpdate"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPersonaConfig"

  /ai/messages:
    get:
      tags: [ai]
      summary: Get chat history with AI assistant
      operationId: getAiMessages
      responses:
        "200":
          description: List of chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiMessage"
    delete:
      tags: [ai]
      summary: Clear chat history
      operationId: clearAiMessages
      responses:
        "200":
          description: Cleared

  /ai/chat:
    post:
      tags: [ai]
      summary: Send a message to the AI assistant
      operationId: chatWithAi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                sessionContext:
                  type: object
              required: [message]
      responses:
        "200":
          description: AI reply
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                required: [reply]

  /ai/generate-quests:
    post:
      tags: [ai]
      summary: Generate AI quests for a live session
      operationId: generateAiQuests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: integer
                viewerCount:
                  type: integer
                sessionStats:
                  type: object
              required: [sessionId]
      responses:
        "200":
          description: Generated quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiQuest"

  /ai/quests:
    get:
      tags: [ai]
      summary: Get quests for a session
      operationId: getAiQuests
      parameters:
        - in: query
          name: sessionId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiQuest"
        "403":
          description: Forbidden

  /ai/generate-event:
    post:
      tags: [ai]
      summary: Generate an AI-crafted live event idea
      operationId: generateAiEvent
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                currentViewers:
                  type: integer
                sessionStats:
                  type: object
      responses:
        "200":
          description: Generated event idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiEventIdea"

  /ai/moderation-log:
    get:
      tags: [ai]
      summary: Get AI moderation log
      operationId: getAiModerationLog
      parameters:
        - in: query
          name: sessionId
          schema:
            type: integer
      responses:
        "200":
          description: Moderation log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiModerationLog"
        "403":
          description: Forbidden

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        displayName:
          type: ["string", "null"]
        tiktokUsername:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
        plan:
          type: string
        createdAt:
          type: string
      required:
        - id
        - clerkId
        - email
        - role
        - plan
        - createdAt

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type: string

    TiktokConnect:
      type: object
      properties:
        tiktokUsername:
          type: string
      required:
        - tiktokUsername

    Streamer:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        displayName:
          type: ["string", "null"]
        tiktokUsername:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isLive:
          type: boolean
        viewerCount:
          type: integer
        totalGiftsReceived:
          type: integer
        plan:
          type: string
      required:
        - id
        - userId
        - isLive
        - viewerCount
        - totalGiftsReceived
        - plan

    Kingdom:
      type: object
      properties:
        id:
          type: integer
        streamerId:
          type: integer
        streamerName:
          type: ["string", "null"]
        name:
          type: string
        level:
          type: integer
        gold:
          type: integer
        wood:
          type: integer
        stone:
          type: integer
        totalBuildings:
          type: integer
      required:
        - id
        - streamerId
        - name
        - level
        - gold
        - wood
        - stone
        - totalBuildings

    Session:
      type: object
      properties:
        id:
          type: integer
        streamerId:
          type: integer
        startedAt:
          type: string
        endedAt:
          type: ["string", "null"]
        peakViewers:
          type: integer
        totalGifts:
          type: integer
        totalLikes:
          type: integer
        totalFollowers:
          type: integer
        totalComments:
          type: integer
        totalShares:
          type: integer
      required:
        - id
        - streamerId
        - startedAt
        - peakViewers
        - totalGifts
        - totalLikes
        - totalFollowers
        - totalComments
        - totalShares

    SessionStarted:
      type: object
      properties:
        sessionId:
          type: integer
        streamerId:
          type: integer
        startedAt:
          type: string
      required:
        - sessionId
        - streamerId
        - startedAt

    ActiveSessionResponse:
      type: object
      properties:
        active:
          type: boolean
        session:
          oneOf:
            - $ref: "#/components/schemas/Session"
            - type: "null"
      required:
        - active

    Automation:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        eventType:
          type: string
        conditionOperator:
          type: string
        conditionValue:
          type: string
        actionType:
          type: string
        actionPayload:
          type: string
        isEnabled:
          type: boolean
        triggerCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - name
        - eventType
        - conditionOperator
        - conditionValue
        - actionType
        - actionPayload
        - isEnabled
        - triggerCount
        - createdAt
        - updatedAt

    AutomationCreate:
      type: object
      properties:
        name:
          type: string
        eventType:
          type: string
        conditionOperator:
          type: string
        conditionValue:
          type: string
        actionType:
          type: string
        actionPayload:
          type: string
      required:
        - name
        - eventType
        - actionType

    SessionStats:
      type: object
      properties:
        id:
