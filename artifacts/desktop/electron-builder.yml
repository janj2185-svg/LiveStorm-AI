# ─── LiveStorm AI — electron-builder config ───────────────────────────────────
# Build with:
#   pnpm --filter @workspace/desktop run build:desktop:linux
#   pnpm --filter @workspace/desktop run build:desktop:win
#   pnpm --filter @workspace/desktop run build:desktop:mac

appId:       ai.livestorm.desktop
productName: LiveStorm AI
copyright:   "Copyright © 2025 LiveStorm AI"

# ─── Files to pack ────────────────────────────────────────────────────────────
files:
  - electron/**/*
  - scripts/**/*
  - resources/**/*
  - package.json
  - "!node_modules/**"

# ─── Output directory ─────────────────────────────────────────────────────────
directories:
  output:          dist-desktop
  buildResources:  resources

# Compress with LZMA for smaller installers
compression: maximum
asar: true

# ─── Custom protocol (Clerk OAuth deep links) ─────────────────────────────────
protocols:
  name: LiveStorm AI
  schemes:
    - livestorm

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements:        resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  title:    "LiveStorm AI"
  contents:
    - { x: 410, y: 150, type: link, path: "/Applications" }
    - { x: 130, y: 150, type: file }

# ─── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    # NSIS installer (.exe) — requires wine when building on Linux
    - target: nsis
      arch: [x64]
    # Portable zip — no wine required, works from Linux
    - target: zip
      arch: [x64]

nsis:
  oneClick:                          false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut:             true
  createStartMenuShortcut:           true
  shortcutName:                      "LiveStorm AI"

# ─── Linux ────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  category:   Utility
  synopsis:   "AI-powered TikTok LIVE streaming assistant"
  description: >
    LiveStorm AI is an AI-powered TikTok LIVE streaming platform.
    Features: AI voice host, boss battles, viewer gamification,
    OBS integration, real-time analytics, and Storm Pass.

# ─── Auto-update (Phase 2 — GitHub Releases) ──────────────────────────────────
