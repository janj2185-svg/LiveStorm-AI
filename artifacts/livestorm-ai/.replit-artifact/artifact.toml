kind = "web"
previewPath = "/"
title = "LiveStorm AI"
version = "1.0.0"
id = "artifacts/livestorm-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23121

[services.development]
run = "pnpm --filter @workspace/livestorm-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/livestorm-ai", "run", "build" ]
publicDir = "artifacts/livestorm-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23121"
BASE_PATH = "/"
